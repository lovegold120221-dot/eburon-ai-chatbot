version: "3.8"

services:
  eburon-ollama-middleware:
    build: ./ollama-middleware
    ports:
      - "11434:11434"
    environment:
      # URL of your self-hosted Ollama instance
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # API key for the middleware (use in the app as OLLAMA_MIDDLEWARE_URL)
      MIDDLEWARE_API_KEY: "eburon-local"
      # Port the middleware listens on
      MIDDLEWARE_PORT: "11434"
      # Default context window for models
      DEFAULT_CONTEXT_WINDOW: "32768"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:11434/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
